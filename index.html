<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PETSS Water Level Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root {
      --bg: #eef3f8;
      --card: #ffffff;
      --text: #15202b;
      --muted: #5b6875;
      --border: #d7e0ea;
      --shadow: 0 10px 24px rgba(20, 32, 43, 0.08);
      --accent: #1f77b4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #eef3f8 0%, #f7f9fc 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 20px 22px 14px 22px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbfe 100%);
    }

    .topbar h1 {
      margin: 0 0 14px 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: end;
    }

    .control-group {
      min-width: 280px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .control-group select {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #bcc9d6;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .control-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 119, 180, 0.12);
    }

    .btn {
      padding: 12px 18px;
      font-size: 14px;
      font-weight: bold;
      color: #ffffff;
      background-color: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.2s;
      height: 45px;
    }

    .btn:hover {
      background-color: #155a8a;
    }

    .check-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 45px;
      padding: 0 12px;
      border: 1px solid #bcc9d6;
      border-radius: 12px;
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      color: #2a3a49;
      cursor: pointer;
      user-select: none;
    }

    .check-wrap input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f5f8fb;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      color: #22303c;
    }

    .pill strong {
      font-weight: 700;
    }

    #status {
      padding: 14px 22px 0 22px;
      font-size: 14px;
      color: var(--muted);
      min-height: 34px;
    }

    #chart {
      width: 100%;
      height: 900px;
      padding: 0 8px 8px 8px;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .topbar h1 {
        font-size: 22px;
      }

      #chart {
        height: 760px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <h1>PETSS Water Level Viewer</h1>

        <div class="controls">
          <div class="control-group">
            <label for="stationSelect">Select station</label>
            <select id="stationSelect"></select>
          </div>

          <div class="control-group" style="min-width: auto;">
            <button id="downloadBtn" class="btn">Download PNG</button>
          </div>

          <div class="control-group" style="min-width: auto;">
            <label class="check-wrap" for="toggleForecastRange">
              <input id="toggleForecastRange" type="checkbox" />
              Show forecast tide range
            </label>
          </div>
        </div>

        <div class="meta">
          <div class="pill"><strong>Observed window:</strong> last 72 hours</div>
          <div class="pill"><strong>Forecast band:</strong> likely range</div>
          <div class="pill"><strong>Datum:</strong> MLLW</div>
          <div class="pill" id="thresholdPill"><strong>Flood threshold:</strong> --</div>
        </div>
      </div>

      <div id="status"></div>
      <div id="chart"></div>
    </div>
  </div>

  <script>
    const observedHoursBack = 72;

    const STATIONS = {
      "8747437": {
        id: "8747437",
        name: "Waveland, MS",
        thresholdMLLW: 3.2,
        datum: "MLLW",
        file: "data/8747437.csv"
      },
      "8760922": {
        id: "8760922",
        name: "Pilots Station, LA",
        thresholdMLLW: 1.5,
        datum: "MLLW",
        file: "data/8760922.csv"
      },
      "8761305": {
        id: "8761305",
        name: "Shell Beach, LA",
        thresholdMLLW: 3.3,
        datum: "MLLW",
        file: "data/8761305.csv"
      },
      "8761724": {
        id: "8761724",
        name: "Grand Isle, LA",
        thresholdMLLW: 2.4,
        datum: "MLLW",
        file: "data/8761724.csv"
      },
      "8762075": {
        id: "8762075",
        name: "Port Fourchon, LA",
        thresholdMLLW: 2.2,
        datum: "MLLW",
        file: "data/8762075.csv"
      },
      "8761927": {
        id: "8761927",
        name: "New Canal Station, LA",
        thresholdMLLW: 2.0,
        datum: "MLLW",
        file: "data/8761927.csv"
      }
    };

    const DEFAULT_STATION_ID = "8761927";

    const stationSelect = document.getElementById("stationSelect");
    const chartEl = document.getElementById("chart");
    const statusEl = document.getElementById("status");
    const thresholdPill = document.getElementById("thresholdPill");
    const toggleForecastRange = document.getElementById("toggleForecastRange");
    let forecastRangeTraceIndex = null;

    function isStrictLocalExtrema(series, idx, neighborhood, kind) {
      const curr = series[idx]?.value;
      if (curr === null || curr === undefined) return false;

      for (let j = 1; j <= neighborhood; j++) {
        const left = series[idx - j]?.value;
        const right = series[idx + j]?.value;
        if (left === null || right === null || left === undefined || right === undefined) return false;

        if (kind === "max") {
          if (curr <= left || curr <= right) return false;
        } else if (kind === "min") {
          if (curr >= left || curr >= right) return false;
        }
      }
      return true;
    }

    function findForecastExtrema(series, neighborhood = 2) {
      const maxima = [];
      const minima = [];

      for (let i = neighborhood; i < series.length - neighborhood; i++) {
        if (isStrictLocalExtrema(series, i, neighborhood, "max")) maxima.push(series[i]);
        if (isStrictLocalExtrema(series, i, neighborhood, "min")) minima.push(series[i]);
      }

      return { maxima, minima };
    }

    function buildForecastTideRangeSeries(forecastSeries) {
      const { maxima, minima } = findForecastExtrema(forecastSeries, 2);
      const cycleRanges = [];

      for (let i = 0; i < maxima.length - 1; i++) {
        const crestA = maxima[i];
        const crestB = maxima[i + 1];
        const troughsBetween = minima.filter(
          trough => trough.dt > crestA.dt && trough.dt < crestB.dt
        );

        if (troughsBetween.length === 0) continue;

        const trough = troughsBetween.reduce((lowest, current) =>
          current.value < lowest.value ? current : lowest
        );

        const crestAvg = (crestA.value + crestB.value) / 2;
        const rangeFt = crestAvg - trough.value;
        if (!Number.isFinite(rangeFt) || rangeFt <= 0) continue;

        cycleRanges.push({
          dt: crestB.dt,
          value: rangeFt,
          cycleStart: crestA.dt,
          cycleEnd: crestB.dt,
          troughTime: trough.dt,
          troughValue: trough.value
        });
      }

      return cycleRanges;
    }

    function populateStationDropdown() {
      const stationList = Object.values(STATIONS).sort((a, b) => a.name.localeCompare(b.name));
      for (const station of stationList) {
        const opt = document.createElement("option");
        opt.value = station.id;
        opt.textContent = `${station.name} (${station.id})`;
        if (station.id === DEFAULT_STATION_ID) opt.selected = true;
        stationSelect.appendChild(opt);
      }
    }

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.style.color = isError ? "#b42318" : "#5b6875";
      statusEl.style.fontWeight = isError ? "700" : "400";
    }

    function parsePetssTime(s) {
      s = String(s).trim();
      if (s.length !== 12) return null;

      const year = Number(s.slice(0, 4));
      const month = Number(s.slice(4, 6)) - 1;
      const day = Number(s.slice(6, 8));
      const hour = Number(s.slice(8, 10));
      const minute = Number(s.slice(10, 12));
      const dt = new Date(Date.UTC(year, month, day, hour, minute));
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function toNumber(v) {
      if (v === undefined || v === null) return null;
      const s = String(v).trim();
      if (s === "") return null;
      const n = Number(s);
      return Number.isFinite(n) ? n : null;
    }

    function fmtLocal(dt) {
      return dt.toLocaleString([], {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatHour(dt) {
      let s = dt.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
      return s.replace(":00", "");
    }

    function formatPeakTime(dt) {
      const day = dt.toLocaleDateString([], { weekday: "short" });
      return `${day} ${formatHour(dt)}`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getTimeFraction(dt, start, end) {
      const span = end.getTime() - start.getTime();
      if (span <= 0) return 0.5;
      return (dt.getTime() - start.getTime()) / span;
    }

    function assignPeakLabelLayout(peaks, firstTime, lastTime) {
      const plotWidthPx = Math.max((chartEl.clientWidth || 1200) - 150, 720);
      const labelWidth = 150;
      const edgePad = 6;
      const laneGap = 10;
      const laneOffsets = [-58, -116, -174, -232];
      const lanes = laneOffsets.map(() => ({ lastRight: -Infinity }));

      return peaks.map((peak) => {
        const frac = getTimeFraction(peak.dt, firstTime, lastTime);
        const xPx = frac * plotWidthPx;

        const boxLeft = clamp(
          xPx - labelWidth / 2,
          edgePad,
          Math.max(edgePad, plotWidthPx - labelWidth - edgePad)
        );
        const boxRight = boxLeft + labelWidth;

        let laneIndex = lanes.findIndex(lane => boxLeft > lane.lastRight + laneGap);

        if (laneIndex === -1) {
          laneIndex = 0;
          for (let i = 1; i < lanes.length; i++) {
            if (lanes[i].lastRight < lanes[laneIndex].lastRight) {
              laneIndex = i;
            }
          }
        }

        lanes[laneIndex].lastRight = Math.max(lanes[laneIndex].lastRight, boxRight);

        const boxCenterPx = boxLeft + labelWidth / 2;
        const ax = Math.round(boxCenterPx - xPx);
        const ay = laneOffsets[laneIndex];

        return { ax, ay };
      });
    }

    function buildPeakAnnotation(peak, layoutPos) {
      const tPeak = peak.dt;
      const tStart = new Date(tPeak.getTime() - 2 * 3600 * 1000);
      const tEnd = new Date(tPeak.getTime() + 2 * 3600 * 1000);

      return {
        x: peak.dt,
        y: peak.value,
        xanchor: "center",
        yanchor: "bottom",
        align: "center",
        showarrow: true,
        arrowhead: 0,
        arrowwidth: 1.35,
        arrowcolor: "#000000",
        ax: layoutPos.ax,
        ay: layoutPos.ay,
        standoff: 2,
        bgcolor: "#5aa2ee",
        bordercolor: "#000000",
        borderwidth: 1,
        borderpad: 5,
        opacity: 1,
        font: {
          family: "Segoe UI, Roboto, Helvetica, Arial, sans-serif",
          color: "#000000",
          size: 12
        },
        text:
          `<span style="font-size:18px;font-weight:600;line-height:1.0;white-space:nowrap;">${formatPeakTime(tPeak)}</span><br>` +
          `<span style="font-size:18px;font-weight:600;line-height:1.0;white-space:nowrap;">${peak.value.toFixed(1)} ft</span><br>` +
          `<span style="font-size:15px;font-weight:500;color:rgba(0,0,0,0.72);line-height:1.0;white-space:nowrap;">Likely ${formatHour(tStart)} - ${formatHour(tEnd)}</span>`
      };
    }

    function loadStation(stationId) {
      const station = STATIONS[stationId];
      if (!station) {
        setStatus("Unknown station selected.", true);
        return;
      }

      forecastRangeTraceIndex = null;
      thresholdPill.innerHTML = `<strong>Flood threshold:</strong> ${station.thresholdMLLW.toFixed(2)} ft ${station.datum}`;
      chartEl.innerHTML = "";

      Papa.parse(`${station.file}?v=${Date.now()}`, {
        download: true,
        dynamicTyping: false,
        skipEmptyLines: true,
        complete: function(results) {
          const rows = results.data;

          if (!rows || rows.length < 2) {
            chartEl.innerHTML = "<p style='padding:20px;color:#b42318;font-weight:bold;'>CSV loaded, but no usable rows were found.</p>";
            setStatus(`No usable data found for ${station.name}.`, true);
            return;
          }

          const dataRows = rows.slice(1);

          const COL_TIME = 0;
          const COL_OB = 2;
          const COL_TWL = 5;
          const COL_TWL90P = 7;
          const COL_TWL10P = 9;

          const observed = [];
          const forecast = [];
          const band = [];

          for (const row of dataRows) {
            if (!row || row.length < 10) continue;

            const dt = parsePetssTime(row[COL_TIME]);
            if (!dt) continue;

            const ob = toNumber(row[COL_OB]);
            const twl = toNumber(row[COL_TWL]);
            const twl90 = toNumber(row[COL_TWL90P]);
            const twl10 = toNumber(row[COL_TWL10P]);

            if (ob !== null) observed.push({ dt, value: ob });
            if (twl !== null) forecast.push({ dt, value: twl });
            if (twl10 !== null && twl90 !== null) band.push({ dt, low: twl10, high: twl90 });
          }

          observed.sort((a, b) => a.dt - b.dt);
          forecast.sort((a, b) => a.dt - b.dt);
          band.sort((a, b) => a.dt - b.dt);

          let latestObservedTime = null;
          if (observed.length > 0) {
            latestObservedTime = observed[observed.length - 1].dt;
          }

          const observedCutoffTime = latestObservedTime
            ? new Date(latestObservedTime.getTime() - observedHoursBack * 60 * 60 * 1000)
            : null;

          const filteredObserved = observed.filter(item => !observedCutoffTime || item.dt >= observedCutoffTime);

          const plotTransitionTime = latestObservedTime || new Date();
          const filteredForecast = forecast.filter(item => item.dt >= plotTransitionTime);
          const filteredBand = band.filter(item => item.dt >= plotTransitionTime);
          const forecastTideRange = buildForecastTideRangeSeries(filteredForecast);

          const xObserved = filteredObserved.map(d => d.dt);
          const yObserved = filteredObserved.map(d => d.value);

          const xForecast = filteredForecast.map(d => d.dt);
          const yForecast = filteredForecast.map(d => d.value);

          const xBand = filteredBand.map(d => d.dt);
          const yBandTop = filteredBand.map(d => d.high);
          const yBandBottom = filteredBand.map(d => d.low);

          const bandLookup = new Map(
            filteredBand.map(d => [d.dt.getTime(), { low: d.low, high: d.high }])
          );

          const customdataForecast = filteredForecast.map(d => {
            const match = bandLookup.get(d.dt.getTime());
            return match ? [match.low, match.high] : [null, null];
          });
          const customdataForecastRange = forecastTideRange.map(item => [
            item.cycleStart,
            item.troughTime,
            item.troughValue,
            item.cycleEnd
          ]);

          if (xObserved.length === 0 && xForecast.length === 0) {
            chartEl.innerHTML = "<p style='padding:20px;color:#b42318;font-weight:bold;'>CSV loaded, but no observed or future forecast water level values were found.</p>";
            setStatus(`No plotted data found for ${station.name}.`, true);
            return;
          }

          const peaks = [];
          for (let i = 3; i < filteredForecast.length - 3; i++) {
            let isLocalMax = true;
            for (let j = 1; j <= 3; j++) {
              if (
                filteredForecast[i].value <= filteredForecast[i - j].value ||
                filteredForecast[i].value <= filteredForecast[i + j].value
              ) {
                isLocalMax = false;
                break;
              }
            }

            if (isLocalMax && filteredForecast[i].value >= (station.thresholdMLLW - 0.5)) {
              if (
                peaks.length === 0 ||
                (filteredForecast[i].dt - peaks[peaks.length - 1].dt) > 8 * 3600 * 1000
              ) {
                peaks.push(filteredForecast[i]);
              }
            }
          }

          const allTimes = [...xObserved, ...xForecast].sort((a, b) => a - b);
          const firstTime = allTimes[0];
          const lastTime = allTimes[allTimes.length - 1];

          const peakLayouts = assignPeakLabelLayout(peaks, firstTime, lastTime);

          const traces = [
            {
              x: [firstTime, lastTime],
              y: [station.thresholdMLLW, station.thresholdMLLW],
              mode: "lines",
              name: `Flood threshold (${station.thresholdMLLW.toFixed(2)} ft ${station.datum})`,
              line: { width: 3, color: "#ff7f0e", dash: "solid" },
              hovertemplate:
                `%{x|%a, %b %-d, %-I:%M %p}` +
                `<br>Flood threshold: %{y:.2f} ft ${station.datum}` +
                `<extra></extra>`
            },
            {
              x: xObserved,
              y: yObserved,
              mode: "lines",
              name: "Observed water level",
              line: { width: 4, color: "#2ca02c" },
              connectgaps: false,
              hovertemplate:
                `%{x|%a, %b %-d, %-I:%M %p}` +
                `<br>Observed water level: %{y:.2f} ft ${station.datum}` +
                `<extra></extra>`
            },
            {
              x: xForecast,
              y: yForecast,
              customdata: customdataForecast,
              mode: "lines",
              name: "Forecast water level",
              line: { width: 4, color: "#1f77b4" },
              connectgaps: false,
              hovertemplate:
                `%{x|%a, %b %-d, %-I:%M %p}` +
                `<br>Expected water level: %{y:.2f} ft ${station.datum}` +
                `<br>Possible range: %{customdata[0]:.2f} – %{customdata[1]:.2f} ft ${station.datum}` +
                `<extra></extra>`
            },
            {
              x: xBand,
              y: yBandTop,
              mode: "lines",
              line: { color: "rgba(0,0,0,0)" },
              hoverinfo: "skip",
              showlegend: false,
              name: "Range upper bound"
            },
            {
              x: xBand,
              y: yBandBottom,
              mode: "lines",
              line: { color: "rgba(0,0,0,0)" },
              fill: "tonexty",
              fillcolor: "rgba(31,119,180,0.18)",
              name: "Likely range",
              hoverinfo: "skip"
            },
            {
              x: peaks.map(p => p.dt),
              y: peaks.map(p => p.value),
              mode: "markers",
              name: "Peak tides",
              marker: { color: "red", size: 8 },
              showlegend: false,
              hoverinfo: "skip"
            },
            {
              x: forecastTideRange.map(item => item.dt),
              y: forecastTideRange.map(item => item.value),
              customdata: customdataForecastRange,
              mode: "lines+markers",
              name: "Forecast tide range (crest-to-crest)",
              line: { width: 3, color: "#6f42c1", dash: "dot" },
              marker: { size: 6, color: "#6f42c1", symbol: "diamond" },
              yaxis: "y2",
              visible: "legendonly",
              hovertemplate:
                `%{x|%a, %b %-d, %-I:%M %p}` +
                `<br>Forecast tide range: %{y:.2f} ft` +
                `<br>Cycle: %{customdata[0]|%a %-I:%M %p} to %{customdata[3]|%a %-I:%M %p}` +
                `<br>Trough: %{customdata[2]:.2f} ft at %{customdata[1]|%a %-I:%M %p}` +
                `<extra></extra>`
            }
          ];

          forecastRangeTraceIndex = traces.length - 1;

          const subtitlePieces = [];
          if (latestObservedTime) {
            subtitlePieces.push(`Latest observed: ${fmtLocal(latestObservedTime)}`);
          }

          const layout = {
            font: {
              family: "Segoe UI, Roboto, Helvetica, Arial, sans-serif",
              color: "#15202b"
            },
            title: {
              text:
                `<b>${station.name} Water Levels</b><br>` +
                `<span style="font-size:14px;color:#5b6875;">${subtitlePieces.join(" | ")}</span>`,
              font: { size: 28 }
            },
            paper_bgcolor: "#ffffff",
            plot_bgcolor: "#ffffff",
            hovermode: "closest",
            margin: { l: 80, r: 36, t: 250, b: 170 },
            xaxis: {
              tickformat: "%a, %b %-d",
              tickfont: { size: 14 },
              gridcolor: "rgba(0,0,0,0.08)",
              zeroline: false
            },
            yaxis: {
              title: { text: `Water level in feet (${station.datum})`, font: { size: 18 } },
              tickfont: { size: 14 },
              gridcolor: "rgba(0,0,0,0.08)",
              zeroline: false
            },
            yaxis2: {
              title: { text: "Forecast tide range (ft)", font: { size: 15, color: "#6f42c1" } },
              tickfont: { size: 13, color: "#6f42c1" },
              overlaying: "y",
              side: "right",
              showgrid: false,
              zeroline: false
            },
            legend: {
              x: 0.01,
              y: -0.09,
              xanchor: "left",
              yanchor: "top",
              orientation: "h",
              bgcolor: "rgba(255,255,255,0)",
              bordercolor: "rgba(0,0,0,0)",
              borderwidth: 0,
              font: { size: 14 }
            },
            annotations: [
              {
                xref: "paper",
                yref: "y",
                x: 0.01,
                y: station.thresholdMLLW,
                xanchor: "left",
                yanchor: "bottom",
                text: "<b>Minor Coastal Flooding</b>",
                showarrow: false,
                font: { color: "#ff7f0e", size: 13 },
                yshift: 4
              }
            ]
          };

          peaks.forEach((p, idx) => {
            layout.annotations.push(buildPeakAnnotation(p, peakLayouts[idx]));
          });

          Plotly.newPlot("chart", traces, layout, {
            responsive: true,
            displayModeBar: false,
            displaylogo: false
          });

          toggleForecastRange.checked = false;
          toggleForecastRange.disabled = forecastTideRange.length === 0;
          toggleForecastRange.title = forecastTideRange.length === 0
            ? "No crest-to-crest forecast tide range available in this forecast window."
            : "Toggle forecast crest-to-crest tide range overlay.";
        },
        error: function(err) {
          chartEl.innerHTML = `<p style="padding:20px;color:#b42318;font-weight:bold;">Failed to load CSV: ${err.message}</p>`;
          setStatus(`Failed to load ${station.name}.`, true);
        }
      });
    }

    populateStationDropdown();

    stationSelect.addEventListener("change", function() {
      loadStation(this.value);
    });

    toggleForecastRange.addEventListener("change", function() {
      if (forecastRangeTraceIndex === null) return;
      const visibleState = this.checked ? true : "legendonly";
      Plotly.restyle("chart", { visible: visibleState }, [forecastRangeTraceIndex]);
    });

    loadStation(DEFAULT_STATION_ID);

    const downloadBtn = document.getElementById("downloadBtn");

    downloadBtn.addEventListener("click", function() {
      const currentStationId = stationSelect.value;
      const stationName = STATIONS[currentStationId].name.replace(/[^a-z0-9]/gi, "_").toLowerCase();

      Plotly.downloadImage("chart", {
        format: "png",
        width: 1200,
        height: 900,
        filename: `petss_water_level_${stationName}`
      });
    });
  </script>
</body>
</html>
