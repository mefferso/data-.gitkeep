<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>New Canal Station Water Levels</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f4f4;
    }
    #chart {
      width: 100%;
      height: 900px;
    }
  </style>
</head>
<body>
  <div id="chart"></div>

  <script>
    const stationName = "New Canal Station, LA";
    const floodThreshold = 2.00; // ft MLLW
    const csvUrl = "data/new_canal.csv?v=4";
    const observedHoursBack = 72;

    function parsePetssTime(s) {
      s = String(s).trim();
      if (s.length !== 12) return null;

      const year = Number(s.slice(0, 4));
      const month = Number(s.slice(4, 6)) - 1;
      const day = Number(s.slice(6, 8));
      const hour = Number(s.slice(8, 10));
      const minute = Number(s.slice(10, 12));

      return new Date(Date.UTC(year, month, day, hour, minute));
    }

    function toNumber(v) {
      if (v === undefined || v === null) return null;
      const s = String(v).trim();
      if (s === "") return null;
      const n = Number(s);
      return Number.isFinite(n) ? n : null;
    }

    Papa.parse(csvUrl, {
      download: true,
      dynamicTyping: false,
      skipEmptyLines: true,
      complete: function(results) {
        const rows = results.data;

        if (!rows || rows.length < 2) {
          document.getElementById("chart").innerHTML =
            "<p style='color:red;font-weight:bold;'>CSV loaded, but no usable rows were found.</p>";
          return;
        }

        // Remove header row
        const dataRows = rows.slice(1);

        // Column map from your CSV
        const COL_TIME = 0;
        const COL_TIDE = 1;
        const COL_OB = 2;
        const COL_SURGE = 3;
        const COL_BIAS = 4;
        const COL_TWL = 5;
        const COL_SURGE90P = 6;
        const COL_TWL90P = 7;
        const COL_SURGE10P = 8;
        const COL_TWL10P = 9;

        const tempObserved = [];
        const xForecast = [];
        const yForecast = [];
        const xBand = [];
        const yBandTop = [];
        const yBandBottom = [];

        for (const row of dataRows) {
          if (!row || row.length < 10) continue;

          const dt = parsePetssTime(row[COL_TIME]);
          if (!dt) continue;

          const ob = toNumber(row[COL_OB]);
          const twl = toNumber(row[COL_TWL]);
          const twl90 = toNumber(row[COL_TWL90P]);
          const twl10 = toNumber(row[COL_TWL10P]);

          if (ob !== null) {
            tempObserved.push({ dt, ob });
          }

          if (twl !== null) {
            xForecast.push(dt);
            yForecast.push(twl);
          }

          if (twl10 !== null && twl90 !== null) {
            xBand.push(dt);
            yBandTop.push(twl90);
            yBandBottom.push(twl10);
          }
        }

        const xObserved = [];
        const yObserved = [];

        let latestObservedTime = null;
        if (tempObserved.length > 0) {
          latestObservedTime = tempObserved[tempObserved.length - 1].dt;
        }

        const observedCutoffTime = latestObservedTime
          ? new Date(latestObservedTime.getTime() - observedHoursBack * 60 * 60 * 1000)
          : null;

        for (const item of tempObserved) {
          if (!observedCutoffTime || item.dt >= observedCutoffTime) {
            xObserved.push(item.dt);
            yObserved.push(item.ob);
          }
        }

        if (xForecast.length === 0 && xObserved.length === 0) {
          document.getElementById("chart").innerHTML =
            "<p style='color:red;font-weight:bold;'>CSV loaded, but no TWL or OB values were found.</p>";
          return;
        }

        const allTimes = [...xObserved, ...xForecast].sort((a, b) => a - b);
        const firstTime = allTimes[0];
        const lastTime = allTimes[allTimes.length - 1];

        const traces = [
          {
            x: [firstTime, lastTime],
            y: [floodThreshold, floodThreshold],
            mode: "lines",
            name: `Flood Advisory criteria (${floodThreshold.toFixed(2)} ft MLLW)`,
            line: { width: 3, color: "#ff7f0e" },
            hovertemplate: "Flood criteria: %{y:.2f} ft MLLW<extra></extra>"
          },
          {
            x: xObserved,
            y: yObserved,
            mode: "lines",
            name: "Observed water level",
            line: { width: 4, color: "#2ca02c" },
            connectgaps: false,
            hovertemplate: "Observed<br>%{x}<br>%{y:.2f} ft MLLW<extra></extra>"
          },
          {
            x: xForecast,
            y: yForecast,
            mode: "lines",
            name: "Forecast water level",
            line: { width: 4, color: "#1f77b4" },
            connectgaps: false,
            hovertemplate: "Forecast<br>%{x}<br>%{y:.2f} ft MLLW<extra></extra>"
          },
          {
            x: xBand,
            y: yBandTop,
            mode: "lines",
            line: { color: "rgba(0,0,0,0)" },
            hoverinfo: "skip",
            showlegend: false,
            name: "90th percentile"
          },
          {
            x: xBand,
            y: yBandBottom,
            mode: "lines",
            line: { color: "rgba(0,0,0,0)" },
            fill: "tonexty",
            fillcolor: "rgba(31,119,180,0.18)",
            name: "10th-90th percentile range",
            hovertemplate: "10th percentile: %{y:.2f} ft MLLW<extra></extra>"
          }
        ];

        const layout = {
          title: {
            text: `${stationName} Water Levels`,
            font: { size: 28 }
          },
          paper_bgcolor: "#f4f4f4",
          plot_bgcolor: "#f4f4f4",
          hovermode: "x unified",
          margin: { l: 80, r: 40, t: 80, b: 170 },
          xaxis: {
            title: { text: "Time (CDT/CST)", font: { size: 18 } },
            tickfont: { size: 14 },
            gridcolor: "rgba(0,0,0,0.08)"
          },
          yaxis: {
            title: { text: "Water level (feet, MLLW)", font: { size: 18 } },
            tickfont: { size: 14 },
            gridcolor: "rgba(0,0,0,0.08)"
          },
          legend: {
            x: 0.01,
            y: -0.08,
            xanchor: "left",
            yanchor: "top",
            orientation: "h",
            bgcolor: "rgba(255,255,255,0)",
            bordercolor: "rgba(0,0,0,0)",
            borderwidth: 0,
            font: { size: 14 }
          },
          annotations: [
            {
              xref: "paper",
              yref: "paper",
              x: 0,
              y: -0.30,
              xanchor: "left",
              align: "left",
              showarrow: false,
              text:
                "Observed = measured water level<br>" +
                "Forecast = expected total water level<br>" +
                "Shaded band = likely range (10th to 90th percentile)<br>" +
                "Threshold line = flood criteria",
              font: { size: 14, color: "#222" }
            }
          ]
        };

        Plotly.newPlot("chart", traces, layout, {
          responsive: true,
          displaylogo: false
        });
      },
      error: function(err) {
        document.getElementById("chart").innerHTML =
          "<p style='color:red;font-weight:bold;'>Failed to load CSV: " + err.message + "</p>";
      }
    });
  </script>
</body>
</html>
