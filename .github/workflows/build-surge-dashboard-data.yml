name: Build Surge Chart Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify required input files exist
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_FILES=(
            "data/surge_dashboard/knew_nbm_hourly.csv"
            "data/surge_dashboard/new_canal_petss_clean.csv"
            "data/surge_dashboard/new_canal_hilo.json"
          )

          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing required input file: $f"
              exit 1
            fi
          done

          mkdir -p data/surge_dashboard

      - name: Build merged surge chart JSON
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import csv
          import json
          from pathlib import Path
          from datetime import datetime, timezone, timedelta
          from zoneinfo import ZoneInfo

          OUT_DIR = Path("data/surge_dashboard")
          NBM_FILE = OUT_DIR / "knew_nbm_hourly.csv"
          PETSS_FILE = OUT_DIR / "new_canal_petss_clean.csv"
          HILO_FILE = OUT_DIR / "new_canal_hilo.json"

          CHART_FILE = OUT_DIR / "chart_data.json"
          STATUS_FILE = OUT_DIR / "dashboard_status.json"

          LOCAL_TZ = ZoneInfo("America/Chicago")
          NOW_UTC = datetime.now(timezone.utc)

          FAVORABLE_MIN_1 = 315
          FAVORABLE_MAX_1 = 360
          FAVORABLE_MIN_2 = 0
          FAVORABLE_MAX_2 = 45

          FAVORABLE_DIR_NOTE = "Northeast through north to northwest"

          def fmt_utc(dt):
              return dt.astimezone(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          def fmt_local(dt):
              return dt.astimezone(LOCAL_TZ).strftime("%Y-%m-%d %H:%M %Z")

          def round_or_none(v, ndigits=2):
              return None if v is None else round(v, ndigits)

          def parse_iso_utc(s):
              return datetime.strptime(s, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)

          def parse_petss_time(s):
              s = str(s).strip()
              for fmt in ("%Y%m%d%H%M", "%Y%m%d%H"):
                  try:
                      return datetime.strptime(s, fmt).replace(tzinfo=timezone.utc)
                  except ValueError:
                      pass
              raise ValueError(f"Could not parse PETSS time: {s}")

          def parse_local_hilo_time(s):
              s = s.strip()
              for fmt in ("%Y-%m-%d %H:%M", "%Y-%m-%d %H:%M:%S"):
                  try:
                      dt_local = datetime.strptime(s, fmt).replace(tzinfo=LOCAL_TZ)
                      return dt_local.astimezone(timezone.utc)
                  except ValueError:
                      pass
              raise ValueError(f"Could not parse hilo time: {s}")

          def to_float(value):
              if value is None:
                  return None
              s = str(value).strip()
              if s == "":
                  return None
              try:
                  return float(s)
              except Exception:
                  return None

          def to_int(value):
              if value is None:
                  return None
              s = str(value).strip()
              if s == "":
                  return None
              try:
                  return int(float(s))
              except Exception:
                  return None

          def is_favorable_dir(deg):
              if deg is None:
                  return False
              return (FAVORABLE_MIN_1 <= deg <= FAVORABLE_MAX_1) or (FAVORABLE_MIN_2 <= deg <= FAVORABLE_MAX_2)

          # -----------------------------
          # Read NBM hourly
          # -----------------------------
          nbm_rows = []
          with NBM_FILE.open("r", newline="") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  try:
                      valid_time_utc = parse_iso_utc(row["valid_time_utc"])
                  except Exception:
                      continue

                  nbm_rows.append({
                      "valid_time_utc": valid_time_utc,
                      "forecast_hour": to_int(row.get("forecast_hour")),
                      "utc_token": row.get("utc_token", ""),
                      "wdr_code": to_int(row.get("wdr_code")),
                      "wind_dir_deg": to_int(row.get("wind_dir_deg")),
                      "wsp_kt": to_float(row.get("wsp_kt")),
                      "gst_kt": to_float(row.get("gst_kt")),
                  })

          nbm_rows.sort(key=lambda r: r["valid_time_utc"])

          nbm_by_time = {r["valid_time_utc"]: r for r in nbm_rows}

          # -----------------------------
          # Read PETSS cleaned CSV
          # -----------------------------
          petss_rows = []
          with PETSS_FILE.open("r", newline="") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  raw_time = row.get("TIME")
                  if not raw_time:
                      continue

                  try:
                      t_utc = parse_petss_time(raw_time)
                  except Exception:
                      continue

                  petss_rows.append({
                      "time_utc": t_utc,
                      "TIDE": to_float(row.get("TIDE")),
                      "OB": to_float(row.get("OB")),
                      "SURGE": to_float(row.get("SURGE")),
                      "BIAS": to_float(row.get("BIAS")),
                      "TWL": to_float(row.get("TWL")),
                      "SURGE10p": to_float(row.get("SURGE10p")),
                      "SURGE90p": to_float(row.get("SURGE90p")),
                      "TWL10p": to_float(row.get("TWL10p")),
                      "TWL90p": to_float(row.get("TWL90p")),
                  })

          petss_rows.sort(key=lambda r: r["time_utc"])

          if not petss_rows:
              raise SystemExit("ERROR: No valid PETSS rows found.")

          # -----------------------------
          # Read hilo markers
          # -----------------------------
          hilo_payload = json.loads(HILO_FILE.read_text())
          predictions = hilo_payload.get("predictions", [])

          hilo_rows = []
          for p in predictions:
              if "t" not in p or "type" not in p:
                  continue
              try:
                  t_utc = parse_local_hilo_time(p["t"])
              except Exception:
                  continue

              hilo_rows.append({
                  "time_utc": t_utc,
                  "time_local": fmt_local(t_utc),
                  "type": str(p.get("type", "")).strip().upper(),
                  "value_ft": to_float(p.get("v")),
              })

          hilo_rows.sort(key=lambda r: r["time_utc"])

          # -----------------------------
          # Build merged series
          # -----------------------------
          start_utc = NOW_UTC - timedelta(hours=6)
          end_utc = NOW_UTC + timedelta(hours=84)

          series = []
          favorable_periods = []
          in_fav = False
          fav_start = None

          display_petss = [r for r in petss_rows if start_utc <= r["time_utc"] <= end_utc]

          for p in display_petss:
              t = p["time_utc"]
              nbm = nbm_by_time.get(t)

              wind_dir = nbm.get("wind_dir_deg") if nbm else None
              gust = nbm.get("gst_kt") if nbm else None
              wsp = nbm.get("wsp_kt") if nbm else None
              is_fav = is_favorable_dir(wind_dir)

              series.append({
                  "time_utc": fmt_utc(t),
                  "time_local": fmt_local(t),
                  "surge_ft": round_or_none(p.get("SURGE"), 3),
                  "surge10_ft": round_or_none(p.get("SURGE10p"), 3),
                  "surge90_ft": round_or_none(p.get("SURGE90p"), 3),
                  "tide_ft": round_or_none(p.get("TIDE"), 3),
                  "twl_ft": round_or_none(p.get("TWL"), 3),
                  "twl10_ft": round_or_none(p.get("TWL10p"), 3),
                  "twl90_ft": round_or_none(p.get("TWL90p"), 3),
                  "obs_ft": round_or_none(p.get("OB"), 3),
                  "bias_ft": round_or_none(p.get("BIAS"), 3),
                  "wind_dir_deg": wind_dir,
                  "wind_speed_kt": round_or_none(wsp, 1),
                  "wind_gust_kt": round_or_none(gust, 1),
                  "is_favorable_wind": is_fav,
              })

              if is_fav and not in_fav:
                  in_fav = True
                  fav_start = t
              elif not is_fav and in_fav:
                  favorable_periods.append({
                      "start_utc": fmt_utc(fav_start),
                      "end_utc": fmt_utc(t),
                      "start_local": fmt_local(fav_start),
                      "end_local": fmt_local(t),
                  })
                  in_fav = False
                  fav_start = None

          if in_fav and fav_start is not None and series:
              last_dt = parse_iso_utc(series[-1]["time_utc"])
              favorable_periods.append({
                  "start_utc": fmt_utc(fav_start),
                  "end_utc": series[-1]["time_utc"],
                  "start_local": fmt_local(fav_start),
                  "end_local": fmt_local(last_dt),
              })

          # -----------------------------
          # Summary stats
          # -----------------------------
          def max_series_value(key):
              vals = []
              for row in series:
                  v = row.get(key)
                  if v is not None:
                      vals.append((row["time_utc"], v))
              if not vals:
                  return None, None
              t, v = max(vals, key=lambda x: x[1])
              return v, t

          max_surge, max_surge_time = max_series_value("surge_ft")
          max_twl, max_twl_time = max_series_value("twl_ft")
          max_gust, max_gust_time = max_series_value("wind_gust_kt")

          upcoming_hilo = [
              {
                  "time_utc": fmt_utc(r["time_utc"]),
                  "time_local": r["time_local"],
                  "type": r["type"],
                  "value_ft": round_or_none(r["value_ft"], 3),
              }
              for r in hilo_rows
              if start_utc <= r["time_utc"] <= end_utc
          ]

          next_high = next((r for r in upcoming_hilo if r["type"] == "H" and parse_iso_utc(r["time_utc"]) >= NOW_UTC), None)
          next_low = next((r for r in upcoming_hilo if r["type"] == "L" and parse_iso_utc(r["time_utc"]) >= NOW_UTC), None)

          if max_surge is not None and max_surge >= 0.8:
              headline = f"Strong surge signal: forecast surge peaks near {max_surge:.2f} ft."
          elif max_surge is not None and max_surge >= 0.4:
              headline = f"Modest surge signal: forecast surge peaks near {max_surge:.2f} ft."
          elif max_surge is not None:
              headline = f"Weak surge signal: forecast surge peaks near {max_surge:.2f} ft."
          else:
              headline = "No forecast surge peak available."

          chart_data = {
              "generated_utc": fmt_utc(NOW_UTC),
              "generated_local": fmt_local(NOW_UTC),
              "station_name": "New Canal Station, LA",
              "station_id": "8761927",
              "wind_source_station_label": "KNEW / Lakefront Airport NBM hourly text",
              "direction_rule": FAVORABLE_DIR_NOTE,
              "direction_rule_degrees": {
                  "range_1": [FAVORABLE_MIN_1, FAVORABLE_MAX_1],
                  "range_2": [FAVORABLE_MIN_2, FAVORABLE_MAX_2],
              },
              "headline": headline,
              "summary": {
                  "max_surge_ft": round_or_none(max_surge, 3),
                  "max_surge_time_utc": max_surge_time,
                  "max_surge_time_local": fmt_local(parse_iso_utc(max_surge_time)) if max_surge_time else None,
                  "max_twl_ft": round_or_none(max_twl, 3),
                  "max_twl_time_utc": max_twl_time,
                  "max_twl_time_local": fmt_local(parse_iso_utc(max_twl_time)) if max_twl_time else None,
                  "max_gust_kt": round_or_none(max_gust, 1),
                  "max_gust_time_utc": max_gust_time,
                  "max_gust_time_local": fmt_local(parse_iso_utc(max_gust_time)) if max_gust_time else None,
                  "next_high_tide": next_high,
                  "next_low_tide": next_low,
              },
              "source_files": {
                  "nbm_hourly_csv": str(NBM_FILE),
                  "petss_clean_csv": str(PETSS_FILE),
                  "hilo_json": str(HILO_FILE),
              },
              "now_utc": fmt_utc(NOW_UTC),
              "now_local": fmt_local(NOW_UTC),
              "series_count": len(series),
              "series": series,
              "hilo_markers": upcoming_hilo,
              "favorable_periods": favorable_periods,
          }

          status = {
              "generated_utc": fmt_utc(NOW_UTC),
              "generated_local": fmt_local(NOW_UTC),
              "headline": headline,
              "series_count": len(series),
              "max_surge_ft": round_or_none(max_surge, 3),
              "max_twl_ft": round_or_none(max_twl, 3),
              "max_gust_kt": round_or_none(max_gust, 1),
              "next_high_tide": next_high,
              "next_low_tide": next_low,
          }

          CHART_FILE.write_text(json.dumps(chart_data, indent=2))
          STATUS_FILE.write_text(json.dumps(status, indent=2))

          print(f"Created {CHART_FILE}")
          print(f"Created {STATUS_FILE}")
          print(f"Series count: {len(series)}")
          print(f"Favorable periods: {len(favorable_periods)}")
          PY

      - name: Show output preview
        shell: bash
        run: |
          set -euo pipefail

          echo "dashboard_status.json"
          cat data/surge_dashboard/dashboard_status.json

          echo
          echo "First 150 lines of chart_data.json"
          head -150 data/surge_dashboard/chart_data.json || true

      - name: Commit updated chart files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/surge_dashboard/chart_data.json
          git add data/surge_dashboard/dashboard_status.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Build surge chart data"
          git push
