name: Fetch PETSS Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest likely PETSS archive
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p downloads extracted data
          rm -f downloads/*
          rm -rf extracted/*
          rm -f data/new_canal.csv data/new_canal_raw.csv

          DATE=$(date -u +%Y%m%d)
          FOUND=""

          for HH in 18 12 06 00; do
            FILE="petss.t${HH}z.gefs_csv.tar.gz"
            URL="https://nomads.ncep.noaa.gov/pub/data/nccf/com/petss/prod/petss.${DATE}/${FILE}"

            echo "Trying $URL"

            if curl -f -L --retry 3 --retry-delay 5 --connect-timeout 30 "$URL" -o "downloads/$FILE"; then
              echo "Downloaded $FILE"
              FOUND="downloads/$FILE"
              break
            fi
          done

          if [ -z "$FOUND" ]; then
            echo "No PETSS archive found for today's 00/06/12/18Z cycles."
            exit 1
          fi

          echo "Archive path: $FOUND"
          ls -lh "$FOUND"
          file "$FOUND"

      - name: Validate archive
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE=$(find downloads -maxdepth 1 -name "*.tar.gz" | head -n 1)

          if [ -z "$ARCHIVE" ]; then
            echo "No archive found in downloads folder."
            exit 1
          fi

          echo "Testing archive: $ARCHIVE"
          gzip -t "$ARCHIVE"
          tar -tzf "$ARCHIVE" > /tmp/petss_contents.txt

          echo "First 200 archive entries:"
          head -200 /tmp/petss_contents.txt

      - name: Extract archive
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE=$(find downloads -maxdepth 1 -name "*.tar.gz" | head -n 1)

          mkdir -p extracted
          tar -xzf "$ARCHIVE" -C extracted

          echo "Extracted files:"
          find extracted -type f | sed 's/^/ - /' | head -300

      - name: Find New Canal station file
        shell: bash
        run: |
          set -euo pipefail

          FILE=$(grep -Ril "8761927" extracted | head -n 1 || true)

          if [ -z "$FILE" ]; then
            FILE=$(find extracted -type f | grep "8761927" | head -n 1 || true)
          fi

          if [ -z "$FILE" ]; then
            echo "Could not find a file containing station 8761927."
            echo "Nearby candidates:"
            find extracted -type f | head -100
            exit 1
          fi

          echo "Using file: $FILE"
          cp "$FILE" data/new_canal_raw.csv

      - name: Clean missing values and save final CSV
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import csv
          from pathlib import Path

          infile = Path("data/new_canal_raw.csv")
          outfile = Path("data/new_canal.csv")

          with infile.open("r", newline="") as f_in, outfile.open("w", newline="") as f_out:
              sample = f_in.read(4096)
              f_in.seek(0)

              try:
                  dialect = csv.Sniffer().sniff(sample, delimiters=",\t ")
              except Exception:
                  class SimpleDialect(csv.excel):
                      delimiter = ","
                  dialect = SimpleDialect

              reader = csv.reader(f_in, dialect)
              writer = csv.writer(f_out)

              for row in reader:
                  cleaned = []
                  for cell in row:
                      v = cell.strip()
                      if v in ("9999.000", "9999"):
                          cleaned.append("")
                      else:
                          cleaned.append(v)
                  writer.writerow(cleaned)
          PY

          rm -f data/new_canal_raw.csv
          echo "Created data/new_canal.csv"
          ls -lh data/new_canal.csv

      - name: Commit updated CSV
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/new_canal.csv

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update PETSS New Canal CSV"
          git push
