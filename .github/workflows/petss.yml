name: Fetch PETSS Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest likely PETSS archive
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p downloads extracted data
          rm -f downloads/*
          rm -rf extracted/*
          rm -f data/*.csv

          DATE=$(date -u +%Y%m%d)
          FOUND=""

          for HH in 18 12 06 00; do
            FILE="petss.t${HH}z.gefs_csv.tar.gz"
            URL="https://nomads.ncep.noaa.gov/pub/data/nccf/com/petss/prod/petss.${DATE}/${FILE}"

            echo "Trying $URL"

            if curl -f -L --retry 3 --retry-delay 5 --connect-timeout 30 "$URL" -o "downloads/$FILE"; then
              echo "Downloaded $FILE"
              FOUND="downloads/$FILE"
              break
            fi
          done

          if [ -z "$FOUND" ]; then
            echo "No PETSS archive found for today's 00/06/12/18Z cycles."
            exit 1
          fi

          echo "Archive path: $FOUND"
          ls -lh "$FOUND"
          file "$FOUND"

      - name: Validate archive
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE=$(find downloads -maxdepth 1 -name "*.tar.gz" | head -n 1)

          if [ -z "$ARCHIVE" ]; then
            echo "No archive found in downloads folder."
            exit 1
          fi

          echo "Testing archive: $ARCHIVE"
          gzip -t "$ARCHIVE"
          tar -tzf "$ARCHIVE" > /tmp/petss_contents.txt

          echo "First 200 archive entries:"
          head -200 /tmp/petss_contents.txt || true

      - name: Extract archive
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE=$(find downloads -maxdepth 1 -name "*.tar.gz" | head -n 1)

          mkdir -p extracted
          tar -xzf "$ARCHIVE" -C extracted

          echo "Extracted file count:"
          find extracted -type f | wc -l

          echo "First 300 extracted files:"
          find extracted -type f | sed 's/^/ - /' | head -300 || true

      - name: Find station files and write cleaned CSVs
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import csv
          import subprocess
          from pathlib import Path

          stations = {
              "8747437": "Waveland, MS",
              "8760922": "Pilots Station, LA",
              "8761305": "Shell Beach, LA",
              "8761724": "Grand Isle, LA",
              "8762075": "Port Fourchon, LA",
              "8761927": "New Canal Station, LA",
          }

          extracted = Path("extracted")
          data_dir = Path("data")
          data_dir.mkdir(exist_ok=True)

          def find_station_file(station_id: str):
              # First try content match
              try:
                  result = subprocess.run(
                      ["grep", "-Ril", station_id, str(extracted)],
                      capture_output=True,
                      text=True,
                      check=False
                  )
                  matches = [line.strip() for line in result.stdout.splitlines() if line.strip()]
                  if matches:
                      return Path(matches[0])
              except Exception:
                  pass

              # Fallback: filename match
              for p in extracted.rglob("*"):
                  if p.is_file() and station_id in p.name:
                      return p

              return None

          found_any = False
          missing = []

          for station_id, station_name in stations.items():
              src = find_station_file(station_id)

              if src is None:
                  print(f"WARNING: Could not find file for {station_id} ({station_name})")
                  missing.append(station_id)
                  continue

              print(f"Using file for {station_id} ({station_name}): {src}")

              out_csv = data_dir / f"{station_id}.csv"

              with src.open("r", newline="") as f_in, out_csv.open("w", newline="") as f_out:
                  sample = f_in.read(4096)
                  f_in.seek(0)

                  try:
                      dialect = csv.Sniffer().sniff(sample, delimiters=",\t ")
                  except Exception:
                      class SimpleDialect(csv.excel):
                          delimiter = ","
                      dialect = SimpleDialect

                  reader = csv.reader(f_in, dialect)
                  writer = csv.writer(f_out)

                  for row in reader:
                      cleaned = []
                      for cell in row:
                          v = cell.strip()
                          if v in ("9999.000", "9999"):
                              cleaned.append("")
                          else:
                              cleaned.append(v)
                      writer.writerow(cleaned)

              print(f"Created {out_csv}")
              found_any = True

          if not found_any:
              raise SystemExit("ERROR: No station CSVs were created.")

          print("\nFinished station extraction.")
          if missing:
              print("Missing stations:", ", ".join(missing))
          PY

          echo "Created CSV files:"
          ls -lh data/*.csv

      - name: Commit updated CSVs
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.csv

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update PETSS station CSVs"
          git push
