name: Fetch PETSS Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest likely PETSS archive
        run: |
          set -e

          mkdir -p downloads extracted data

          DATE=$(date -u +%Y%m%d)

          for HH in 18 12 06 00; do
            FILE="petss.t${HH}z.gefs_csv.tar.gz"
            URL="https://nomads.ncep.noaa.gov/pub/data/nccf/com/petss/prod/petss.${DATE}/${FILE}"

            echo "Trying $URL"

            if curl -f -L "$URL" -o "downloads/$FILE"; then
              echo "Downloaded $FILE"
              echo "ARCHIVE=downloads/$FILE" >> $GITHUB_ENV
              break
            fi
          done

          if [ -z "${ARCHIVE:-}" ] && [ ! -f downloads/*.tar.gz ]; then
            echo "No PETSS archive found for today's cycles."
            exit 1
          fi

      - name: Extract archive
        run: |
          set -e
          tar -xzf downloads/*.tar.gz -C extracted
          echo "Extracted files:"
          find extracted -type f | head -100

      - name: Look for New Canal content
        run: |
          set -e
          echo "Searching extracted files for 8761927..."
          grep -Rin "8761927" extracted || true

          echo "Searching filenames for 8761927..."
          find extracted -type f | grep "8761927" || true

      - name: Save matching file if found
        run: |
          set -e

          FILE=$(grep -Ril "8761927" extracted | head -n 1 || true)

          if [ -z "$FILE" ]; then
            FILE=$(find extracted -type f | grep "8761927" | head -n 1 || true)
          fi

          if [ -z "$FILE" ]; then
            echo "Could not find a file containing station 8761927."
            exit 1
          fi

          echo "Using file: $FILE"
          cp "$FILE" data/new_canal.csv

      - name: Commit updated CSV
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/new_canal.csv
          git commit -m "Update PETSS data" || echo "No changes to commit"
          git push
